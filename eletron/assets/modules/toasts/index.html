<!DOCTYPE html>
<html lang="id" data-color-mode="light" data-light-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexa Primer CSS Demo</title>

  <link rel="stylesheet" href="../nexa.css">


  <style>
    body {
      padding: 32px;
      max-width: 760px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--fgColor-default);
      background-color: var(--bgColor-default);
    }
    h2 {
      margin: 40px 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--fgColor-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--borderColor-default);
      padding-bottom: 6px;
    }
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <h1>Toast Component Demo</h1>

  <h2>Default (Info)</h2>
  <div class="Toast">
    <span class="Toast-icon">ℹ</span>
    <div class="Toast-content">Informasi: Data berhasil dimuat.</div>
    <button class="Toast-dismissButton">✕</button>
  </div>

  <h2>Success</h2>
  <div class="Toast Toast--success">
    <span class="Toast-icon">✔</span>
    <div class="Toast-content">Berhasil! Perubahan telah disimpan.</div>
    <button class="Toast-dismissButton">✕</button>
  </div>

  <h2>Warning</h2>
  <div class="Toast Toast--warning">
    <span class="Toast-icon">⚠</span>
    <div class="Toast-content">Peringatan: Sesi Anda akan habis dalam 5 menit.</div>
    <button class="Toast-dismissButton">✕</button>
  </div>

  <h2>Error</h2>
  <div class="Toast Toast--error">
    <span class="Toast-icon">✖</span>
    <div class="Toast-content">Error: Gagal menghubungi server. Coba lagi.</div>
    <button class="Toast-dismissButton">✕</button>
  </div>

  <h2>Loading</h2>
  <div class="Toast Toast--loading">
    <span class="Toast-icon">⏳</span>
    <div class="Toast-content">Memuat data, harap tunggu<span class="AnimatedEllipsis"></span></div>
  </div>

  <script>
    document.querySelectorAll('.Toast-dismissButton').forEach(btn => {
      btn.addEventListener('click', () => btn.closest('.Toast').style.display = 'none');
    });
  </script>

</body>
</html>
