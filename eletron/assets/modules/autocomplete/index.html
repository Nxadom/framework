<!DOCTYPE html>
<html lang="id" data-color-mode="light" data-light-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocomplete - Primer CSS Demo</title>

  <!-- <link rel="stylesheet" href="../primitives/size.css">
  <link rel="stylesheet" href="../primitives/light.css">
  <link rel="stylesheet" href="../core/index.css">
  <link rel="stylesheet" href="../forms/index.css"> -->
  <link rel="stylesheet" href="../nexa.css">

  <style>
    body {
      padding: 32px;
      max-width: 480px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--fgColor-default);
      background-color: var(--bgColor-default);
    }
  </style>
</head>
<body>
  <h1>Autocomplete Demo</h1>

  <div class="form-group" style="max-width:400px;">
    <dl>
      <dt class="form-group-header"><label for="autocomplete-input">Cari buah:</label></dt>
      <dd class="form-group-body" style="position:relative;">
        <input id="autocomplete-input" class="form-control" type="text" autocomplete="off" placeholder="Ketik nama buah...">
        <ul class="suggester" id="autocomplete-list" style="display:none; position:absolute; top:100%; left:0; width:100%; z-index:10; margin-top:0;">
          <li tabindex="0"><strong>Apel</strong> <small>Buah segar</small></li>
          <li tabindex="0"><strong>Pisang</strong> <small>Buah kaya potasium</small></li>
          <li tabindex="0"><strong>Jeruk</strong> <small>Vitamin C</small></li>
          <li tabindex="0"><strong>Anggur</strong> <small>Buah manis</small></li>
          <li tabindex="0"><strong>Mangga</strong> <small>Musiman</small></li>
        </ul>
      </dd>
    </dl>
  </div>

  <script>
    const input = document.getElementById('autocomplete-input');
    const list = document.getElementById('autocomplete-list');
    const items = Array.from(list.querySelectorAll('li'));

    input.addEventListener('input', function() {
      const val = this.value.trim().toLowerCase();
      let found = 0;
      items.forEach(li => {
        const text = li.innerText.toLowerCase();
        if (val && text.includes(val)) {
          li.style.display = '';
          found++;
        } else {
          li.style.display = 'none';
        }
      });
      list.style.display = (val && found > 0) ? '' : 'none';
    });
    input.addEventListener('blur', function() {
      setTimeout(() => { list.style.display = 'none'; }, 120);
    });
    input.addEventListener('focus', function() {
      const val = this.value.trim().toLowerCase();
      let found = 0;
      items.forEach(li => {
        const text = li.innerText.toLowerCase();
        if (val && text.includes(val)) found++;
      });
      list.style.display = (val && found > 0) ? '' : 'none';
    });
    // Klik untuk pilih
    list.addEventListener('mousedown', function(e) {
      const li = e.target.closest('li');
      if (li && li.style.display !== 'none') {
        input.value = li.innerText.split('\n')[0];
        list.style.display = 'none';
      }
    });
  </script>

</body>
</html>
