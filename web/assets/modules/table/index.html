<!DOCTYPE html>
<html lang="id" data-color-mode="light" data-light-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexa Primer CSS Demo</title>

  <link rel="stylesheet" href="../nexa.css">


  <style>
    body {
      padding: 32px;
      max-width: 760px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--fgColor-default);
      background-color: var(--bgColor-default);
    }
    h2 {
      margin: 40px 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--fgColor-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--borderColor-default);
      padding-bottom: 6px;
    }
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <h1>Table Object Demo</h1>

  <h2>Basic — Avatar + Content + Action</h2>
  <div class="TableObject" style="width:100%;border:1px solid var(--borderColor-default);border-radius:6px;padding:12px;margin-bottom:16px;">
    <div class="TableObject-item" style="padding-right:12px;">
      <img src="https://avatars.githubusercontent.com/u/1?v=4" alt="avatar" style="width:40px;height:40px;border-radius:50%;">
    </div>
    <div class="TableObject-item TableObject-item--primary">
      <strong>octocat</strong>
      <div style="color:var(--fgColor-muted);">GitHub mascot and open source enthusiast.</div>
    </div>
    <div class="TableObject-item" style="padding-left:12px;">
      <button style="padding:5px 12px;border:1px solid var(--borderColor-default);border-radius:6px;background:var(--bgColor-default);cursor:pointer;">Follow</button>
    </div>
  </div>

  <h2>File Row — Icon + Name + Meta + Action</h2>
  <div class="TableObject" style="width:100%;border:1px solid var(--borderColor-default);border-radius:6px;padding:10px 12px;margin-bottom:8px;">
    <div class="TableObject-item" style="padding-right:10px;color:var(--fgColor-muted);">📄</div>
    <div class="TableObject-item TableObject-item--primary">README.md</div>
    <div class="TableObject-item" style="padding-left:12px;color:var(--fgColor-muted);font-size:12px;">2 days ago</div>
    <div class="TableObject-item" style="padding-left:12px;">
      <button style="padding:3px 8px;border:1px solid var(--borderColor-default);border-radius:6px;background:var(--bgColor-default);font-size:12px;cursor:pointer;">Edit</button>
    </div>
  </div>
  <div class="TableObject" style="width:100%;border:1px solid var(--borderColor-default);border-radius:6px;padding:10px 12px;margin-bottom:8px;">
    <div class="TableObject-item" style="padding-right:10px;color:var(--fgColor-muted);">📁</div>
    <div class="TableObject-item TableObject-item--primary">src/</div>
    <div class="TableObject-item" style="padding-left:12px;color:var(--fgColor-muted);font-size:12px;">5 days ago</div>
    <div class="TableObject-item" style="padding-left:12px;">
      <button style="padding:3px 8px;border:1px solid var(--borderColor-default);border-radius:6px;background:var(--bgColor-default);font-size:12px;cursor:pointer;">Edit</button>
    </div>
  </div>

  <h2>Form Row — Label + Input + Button</h2>
  <div class="TableObject" style="width:100%;">
    <div class="TableObject-item" style="padding-right:8px;white-space:nowrap;">
      <label for="to-input">Username</label>
    </div>
    <div class="TableObject-item TableObject-item--primary">
      <input id="to-input" type="text" placeholder="Masukkan username..." style="width:100%;padding:5px 8px;border:1px solid var(--borderColor-default);border-radius:6px;">
    </div>
    <div class="TableObject-item" style="padding-left:8px;">
      <button style="padding:5px 12px;background:#0969da;color:#fff;border:none;border-radius:6px;cursor:pointer;">Cari</button>
    </div>
  </div>

</body>
</html>
