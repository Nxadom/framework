<!DOCTYPE html>
<html lang="id" data-color-mode="light" data-light-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branch Name - Primer CSS Demo</title>

  <link rel="stylesheet" href="../nexa.css">

  <style>
    body {
      padding: 32px;
      max-width: 760px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--fgColor-default);
      background-color: var(--bgColor-default);
    }
    h2 {
      margin: 40px 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--fgColor-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--borderColor-default);
      padding-bottom: 6px;
    }
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <h1>Pagination Component Demo</h1>

  <div class="paginate-container">
    <div class="pagination">
      <a class="previous_page" href="#">Previous</a>
      <a href="#">1</a>
      <span class="gap">…</span>
      <a href="#">4</a>
      <a href="#">5</a>
      <span class="current" aria-current="page">6</span>
      <a href="#">7</a>
      <a href="#">8</a>
      <span class="gap">…</span>
      <a href="#">20</a>
      <a class="next_page" href="#">Next</a>
    </div>
  </div>

  <div class="paginate-container">
    <div class="pagination">
      <span class="previous_page disabled" aria-disabled="true">Previous</span>
      <span class="current" aria-current="page">1</span>
      <a href="#">2</a>
      <a href="#">3</a>
      <span class="gap">…</span>
      <a href="#">10</a>
      <a class="next_page" href="#">Next</a>
    </div>
  </div>


</body>
</html>
