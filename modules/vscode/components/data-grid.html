<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Grid — VS Code UI Toolkit</title>
    <link rel="stylesheet" href="vs.css">
    <style>
        h2 { color: #007acc; font-size: 18px; margin-bottom: 20px; }
        .demo { background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; padding: 20px; }
    </style>
</head>
<body>
    <h2>vscode-data-grid</h2>
    <div class="demo">
        <div class="vsc-data-grid">
            <div class="vsc-data-grid-row header">
                <div class="vsc-data-grid-cell header">Nama</div>
                <div class="vsc-data-grid-cell header">Tipe</div>
                <div class="vsc-data-grid-cell header">Ukuran</div>
            </div>
            <div class="vsc-data-grid-row">
                <div class="vsc-data-grid-cell">index.js</div>
                <div class="vsc-data-grid-cell">JavaScript</div>
                <div class="vsc-data-grid-cell">2.4 KB</div>
            </div>
            <div class="vsc-data-grid-row">
                <div class="vsc-data-grid-cell">style.css</div>
                <div class="vsc-data-grid-cell">CSS</div>
                <div class="vsc-data-grid-cell">1.1 KB</div>
            </div>
            <div class="vsc-data-grid-row">
                <div class="vsc-data-grid-cell">index.html</div>
                <div class="vsc-data-grid-cell">HTML</div>
                <div class="vsc-data-grid-cell">3.7 KB</div>
            </div>
            <div class="vsc-data-grid-row">
                <div class="vsc-data-grid-cell">server.py</div>
                <div class="vsc-data-grid-cell">Python</div>
                <div class="vsc-data-grid-cell">5.2 KB</div>
            </div>
        </div>
    </div>
</body>
</html>
