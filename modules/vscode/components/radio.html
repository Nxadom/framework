<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio — VS Code UI Toolkit</title>
    <link rel="stylesheet" href="vs.css">
    <style>
        h2 { color: #007acc; font-size: 18px; margin-bottom: 20px; }
        .demo { display: flex; flex-wrap: wrap; gap: 20px; background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; padding: 20px; }
    </style>
</head>
<body>
    <h2>vscode-radio / vscode-radio-group</h2>
    <div class="demo">
        <div class="vsc-radio-group">
            <div style="color:#888;font-size:11px;margin-bottom:4px;">VERTICAL</div>
            <div class="positioning-region">
                <label class="vsc-radio checked" onclick="this.parentElement.querySelectorAll('.vsc-radio').forEach(r=>r.classList.remove('checked')); this.classList.add('checked')">
                    <span class="control"><span class="dot"></span></span><span class="label">JavaScript</span>
                </label>
                <label class="vsc-radio" onclick="this.parentElement.querySelectorAll('.vsc-radio').forEach(r=>r.classList.remove('checked')); this.classList.add('checked')">
                    <span class="control"><span class="dot"></span></span><span class="label">TypeScript</span>
                </label>
                <label class="vsc-radio" onclick="this.parentElement.querySelectorAll('.vsc-radio').forEach(r=>r.classList.remove('checked')); this.classList.add('checked')">
                    <span class="control"><span class="dot"></span></span><span class="label">Python</span>
                </label>
            </div>
        </div>
        <div class="vsc-radio-group horizontal">
            <div style="color:#888;font-size:11px;margin-bottom:4px;">HORIZONTAL</div>
            <div class="positioning-region">
                <label class="vsc-radio checked" onclick="this.parentElement.querySelectorAll('.vsc-radio').forEach(r=>r.classList.remove('checked')); this.classList.add('checked')">
                    <span class="control"><span class="dot"></span></span><span class="label">Ringan</span>
                </label>
                <label class="vsc-radio" onclick="this.parentElement.querySelectorAll('.vsc-radio').forEach(r=>r.classList.remove('checked')); this.classList.add('checked')">
                    <span class="control"><span class="dot"></span></span><span class="label">Sedang</span>
                </label>
            </div>
        </div>
    </div>
</body>
</html>
