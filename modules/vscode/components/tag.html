<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag — VS Code UI Toolkit</title>
    <link rel="stylesheet" href="vs.css">
    <style>
        h2 { color: #007acc; font-size: 18px; margin-bottom: 20px; }
        .demo { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; padding: 20px; }
    </style>
</head>
<body>
    <h2>vscode-tag</h2>
    <div class="demo">
        <span class="vsc-tag"><span class="control">beta</span></span>
        <span class="vsc-tag"><span class="control">new</span></span>
        <span class="vsc-tag"><span class="control">deprecated</span></span>
        <span class="vsc-tag"><span class="control">experimental</span></span>
    </div>
</body>
</html>
