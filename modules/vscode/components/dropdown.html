<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown — VS Code UI Toolkit</title>
    <link rel="stylesheet" href="vs.css">
    <style>
        h2 { color: #007acc; font-size: 18px; margin-bottom: 20px; }
        .demo { display: flex; flex-wrap: wrap; gap: 24px; background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; padding: 20px; }
    </style>
</head>
<body>
    <h2>vscode-dropdown / vscode-option</h2>
    <p style="font-size:12px;color:#888;margin-bottom:12px;">Klik untuk buka, klik opsi untuk pilih</p>
    <div class="demo">
        <div class="vsc-dropdown-wrapper">
            <div class="vsc-dropdown" tabindex="0" onclick="this.nextElementSibling.classList.toggle('open')" onblur="setTimeout(()=>this.nextElementSibling.classList.remove('open'),200)">
                <span class="control"><span>JavaScript</span><span class="arrow">▼</span></span>
            </div>
            <div class="vsc-dropdown-list open">
                <div class="vsc-option selected" onclick="this.closest('.vsc-dropdown-wrapper').querySelector('.control span:first-child').textContent=this.textContent;this.closest('.vsc-dropdown-list').classList.remove('open')">JavaScript</div>
                <div class="vsc-option" onclick="this.closest('.vsc-dropdown-wrapper').querySelector('.control span:first-child').textContent=this.textContent;this.closest('.vsc-dropdown-list').classList.remove('open')">TypeScript</div>
                <div class="vsc-option" onclick="this.closest('.vsc-dropdown-wrapper').querySelector('.control span:first-child').textContent=this.textContent;this.closest('.vsc-dropdown-list').classList.remove('open')">Python</div>
                <div class="vsc-option" onclick="this.closest('.vsc-dropdown-wrapper').querySelector('.control span:first-child').textContent=this.textContent;this.closest('.vsc-dropdown-list').classList.remove('open')">HTML/CSS</div>
            </div>
        </div>
        <div class="vsc-dropdown-wrapper">
            <div class="vsc-dropdown" tabindex="0" onclick="this.nextElementSibling.classList.toggle('open')" onblur="setTimeout(()=>this.nextElementSibling.classList.remove('open'),200)">
                <span class="control"><span>Pilih tema...</span><span class="arrow">▼</span></span>
            </div>
            <div class="vsc-dropdown-list">
                <div class="vsc-option" onclick="this.closest('.vsc-dropdown-wrapper').querySelector('.control span:first-child').textContent=this.textContent;this.closest('.vsc-dropdown-list').classList.remove('open')">Dark Modern</div>
                <div class="vsc-option" onclick="this.closest('.vsc-dropdown-wrapper').querySelector('.control span:first-child').textContent=this.textContent;this.closest('.vsc-dropdown-list').classList.remove('open')">Light Modern</div>
            </div>
        </div>
    </div>
</body>
</html>
