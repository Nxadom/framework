<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divider — VS Code UI Toolkit</title>
    <link rel="stylesheet" href="vs.css">
    <style>
        h2 { color: #007acc; font-size: 18px; margin-bottom: 20px; }
        .demo { background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; padding: 20px; }
    </style>
</head>
<body>
    <h2>vscode-divider</h2>
    <div class="demo">
        <p style="margin-bottom:8px;">Konten di atas divider</p>
        <hr class="vsc-divider">
        <p style="margin-top:8px;">Konten di bawah divider</p>
        <hr class="vsc-divider">
        <p style="margin-top:8px;">Konten setelah divider kedua</p>
    </div>
</body>
</html>
